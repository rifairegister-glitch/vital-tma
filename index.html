<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITAL - Family Vault</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: var(--tg-theme-bg-color, #ffffff); 
            color: var(--tg-theme-text-color, #222); 
            transition: all 0.3s ease;
        }
        .card { 
            background-color: var(--tg-theme-secondary-bg-color, #f3f4f6); 
            border-radius: 16px;
        }
        .btn-primary { 
            background-color: var(--tg-theme-button-color, #2481cc); 
            color: var(--tg-theme-button-text-color, #ffffff); 
        }
    </style>
</head>
<body class="p-5 font-sans min-h-screen">
    <div class="flex items-center space-x-3 mb-8">
        <div id="user-photo" class="w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold overflow-hidden">
            V
        </div>
        <div>
            <h1 class="text-xl font-bold leading-tight">VITAL Vault</h1>
            <p class="text-xs opacity-70">Halo, <span id="user-name">User</span>!</p>
        </div>
    </div>

    <div class="card p-4 mb-6 shadow-sm">
        <h2 class="font-bold text-sm mb-1 text-blue-500 uppercase tracking-wider">Status Brankas</h2>
        <p class="text-lg font-medium italic">"Semua aset keluarga aman tersimpan."</p>
    </div>

    <div class="grid grid-cols-2 gap-4">
        <button class="card p-5 flex flex-col items-center hover:scale-95 transition-transform">
            <span class="text-3xl mb-2">🛡️</span>
            <span class="text-sm font-bold">Dokumen</span>
        </button>
        <button class="card p-5 flex flex-col items-center hover:scale-95 transition-transform">
            <span class="text-3xl mb-2">📜</span>
            <span class="text-sm font-bold">Legacy</span>
        </button>
        <button class="card p-5 flex flex-col items-center hover:scale-95 transition-transform">
            <span class="text-3xl mb-2">📅</span>
            <span class="text-sm font-bold">Tagihan</span>
        </button>
        <button class="card p-5 flex flex-col items-center hover:scale-95 transition-transform">
            <span class="text-3xl mb-2">💎</span>
            <span class="text-sm font-bold text-amber-600">Pro</span>
        </button>
    </div>

    <button id="add-btn" class="btn-primary w-full py-4 rounded-2xl mt-8 font-bold text-lg shadow-lg active:opacity-80">
        + Tambah Data Baru
    </button>

    <script>
        // 1. Inisialisasi Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Layar penuh
        tg.ready();  // Memberitahu Telegram aplikasi siap

        // 2. Ambil data user asli dari Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = user.first_name || "Rifai";
            if (user.photo_url) {
                document.getElementById('user-photo').innerHTML = `<img src="${user.photo_url}" class="w-full h-full object-cover">`;
            }
        }

        // 3. Efek Haptic (Getaran) saat klik tombol (Khas Telegram)
        document.getElementById('add-btn').addEventListener('click', () => {
            tg.HapticFeedback.impactOccurred('medium');
            tg.showAlert("Fitur tambah data akan segera hadir di Step 2!");
        });

        // 4. Tombol Utama Telegram (Bawah)
        tg.MainButton.setText("KELUAR");
        tg.MainButton.show();
        tg.MainButton.onClick(() => tg.close());
    </script>
</body>
</html>
